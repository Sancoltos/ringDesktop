<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Ring Live</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: transparent; width: 380px; height: 260px; overflow: hidden; font-family: 'IBM Plex Mono', monospace; -webkit-app-region: drag; }

  #wrapper {
    width: 380px; height: 260px; border-radius: 12px; overflow: hidden;
    position: relative; background: #0a0a0f;
    border: 1px solid rgba(59,130,246,0.5);
    box-shadow: 0 8px 32px rgba(0,0,0,0.6), 0 0 0 1px rgba(59,130,246,0.15);
    animation: popIn 0.3s cubic-bezier(0.175,0.885,0.32,1.275) both;
  }
  video { width: 100%; height: 100%; object-fit: cover; display: block; }

  #overlay {
    position: absolute; inset: 0;
    background: linear-gradient(to bottom, rgba(0,0,0,0.6) 0%, transparent 35%, transparent 60%, rgba(0,0,0,0.7) 100%);
    display: flex; flex-direction: column; justify-content: space-between;
    padding: 10px 12px; -webkit-app-region: no-drag;
  }
  #top-bar { display: flex; align-items: center; justify-content: space-between; }
  .live-badge { display: flex; align-items: center; gap: 5px; background: rgba(239,68,68,0.85); border-radius: 4px; padding: 3px 8px; font-size: 10px; font-weight: 600; letter-spacing: 0.1em; color: #fff; }
  .live-dot { width: 6px; height: 6px; border-radius: 50%; background: #fff; animation: pulse 1s ease-in-out infinite; }
  #close-btn { width: 26px; height: 26px; border-radius: 50%; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.2); color: rgba(255,255,255,0.8); font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.2s; -webkit-app-region: no-drag; }
  #close-btn:hover { background: rgba(239,68,68,0.8); border-color: transparent; }
  #bottom-bar { display: flex; align-items: flex-end; justify-content: space-between; }
  #camera-name { font-size: 13px; font-weight: 600; color: #fff; text-shadow: 0 1px 4px rgba(0,0,0,0.8); margin-bottom: 2px; }
  #event-label { font-size: 10px; color: rgba(255,255,255,0.6); letter-spacing: 0.08em; }
  #timestamp   { font-size: 10px; color: rgba(255,255,255,0.5); letter-spacing: 0.06em; }

  #loading-state { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; background: #0a0a0f; z-index: 10; }
  #loading-state.hidden { display: none; }
  .stream-spinner { width: 32px; height: 32px; border: 2px solid rgba(59,130,246,0.2); border-top-color: #3b82f6; border-radius: 50%; animation: spin 0.9s linear infinite; }
  #loading-state p { font-size: 10px; color: rgba(255,255,255,0.4); letter-spacing: 0.1em; }
  #loading-cam { font-size: 12px; color: rgba(255,255,255,0.7); font-weight: 600; }

  #error-state { position: absolute; inset: 0; display: none; flex-direction: column; align-items: center; justify-content: center; gap: 8px; background: #0a0a0f; z-index: 10; padding: 20px; text-align: center; }
  #error-state.visible { display: flex; }
  #error-state .err-icon { font-size: 28px; opacity: 0.5; }
  #error-state p { font-size: 11px; color: rgba(255,255,255,0.4); letter-spacing: 0.06em; line-height: 1.5; }

  #wrapper::after  { content:''; position:absolute; inset:0; background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px); pointer-events:none; border-radius:12px; }
  #wrapper::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg,transparent,#3b82f6,#22d3ee,transparent); z-index:20; }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  @keyframes spin  { to{transform:rotate(360deg)} }
  @keyframes popIn { from{opacity:0;transform:scale(0.85) translateY(-10px)} to{opacity:1;transform:scale(1) translateY(0)} }
</style>
</head>
<body>
<div id="wrapper">
  <video id="live-video" autoplay muted playsinline></video>

  <div id="loading-state">
    <div class="stream-spinner"></div>
    <div id="loading-cam">Camera</div>
    <p>CONNECTING LIVE STREAM...</p>
  </div>

  <div id="error-state">
    <div class="err-icon">📡</div>
    <p id="error-msg">STREAM UNAVAILABLE</p>
  </div>

  <div id="overlay">
    <div id="top-bar">
      <div class="live-badge"><div class="live-dot"></div>LIVE</div>
      <button id="close-btn">✕</button>
    </div>
    <div id="bottom-bar">
      <div>
        <div id="camera-name">Camera</div>
        <div id="event-label">🏃 MOTION DETECTED</div>
      </div>
      <div id="timestamp">--:--</div>
    </div>
  </div>
</div>

<script>
const { ipcRenderer } = require('electron')
const fs   = require('fs')
const path = require('path')
const os   = require('os')
const RECORDINGS_DIR = path.join(os.homedir(), 'Desktop', 'Ring Recordings')
const video        = document.getElementById('live-video')
const loadingState = document.getElementById('loading-state')
const errorState   = document.getElementById('error-state')
const camNameEl    = document.getElementById('camera-name')
const loadingCamEl = document.getElementById('loading-cam')
const eventLabelEl = document.getElementById('event-label')
const tsEl         = document.getElementById('timestamp')
const errorMsg     = document.getElementById('error-msg')
let pc = null
let activeCameraId = null
let reconnectTimer = null
let reconnectCount = 0
let shouldRecord   = false
let mediaRecorder  = null
let recordedChunks = []
const RECORD_MS    = 20000

setInterval(() => {
  tsEl.textContent = new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit'})
}, 1000)

document.getElementById('close-btn').addEventListener('click', () => {
  stopPc()
  ipcRenderer.send('close-popup')
})

window.addEventListener('beforeunload', stopPc)

function stopPc() {
  if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null }
  if (mediaRecorder && mediaRecorder.state === 'recording') { try { mediaRecorder.stop() } catch(e){} }
  if (pc) { try { pc.close() } catch(e){} ; pc = null }
  // Tell main process to end the Ring session so the cooldown timer starts
  if (activeCameraId) ipcRenderer.invoke('stop-webrtc-session', activeCameraId)
}

function startRecording(stream) {
  if (mediaRecorder) { try { mediaRecorder.stop() } catch(e){} }
  recordedChunks = []
  try {
    const mimeType = MediaRecorder.isTypeSupported('video/webm;codecs=vp9')
      ? 'video/webm;codecs=vp9'
      : MediaRecorder.isTypeSupported('video/webm;codecs=vp8')
      ? 'video/webm;codecs=vp8'
      : 'video/webm'
    mediaRecorder = new MediaRecorder(stream, { mimeType })
    mediaRecorder.ondataavailable = e => { if (e.data && e.data.size > 0) recordedChunks.push(e.data) }
    mediaRecorder.onstop = async () => {
      if (!recordedChunks.length) { mediaRecorder = null; return }
      try {
        const blob        = new Blob(recordedChunks, { type: mimeType })
        const arrayBuffer = await blob.arrayBuffer()
        const camName     = camNameEl.textContent.replace(/[^a-z0-9]/gi, '_')
        const stamp       = new Date().toISOString().replace(/[:.]/g, '-').replace('T','_').slice(0,19)
        const outFile     = path.join(RECORDINGS_DIR, `${stamp}_${camName}.webm`)
        fs.writeFileSync(outFile, Buffer.from(arrayBuffer))
        ipcRenderer.send('clip-saved-notify', { file: outFile, camera: camNameEl.textContent })
      } catch(e) {
        console.error('[recorder] save failed:', e.message)
      }
      recordedChunks = []
      mediaRecorder  = null
    }
    mediaRecorder.start(1000)
    setTimeout(() => {
      if (mediaRecorder && mediaRecorder.state === 'recording') mediaRecorder.stop()
    }, RECORD_MS)
  } catch(e) {
    console.error('[recorder]', e.message)
  }
}

ipcRenderer.on('camera-update', (_, { cameraName, eventType, cameraId, shouldRecord: record }) => {
  camNameEl.textContent    = cameraName
  loadingCamEl.textContent = cameraName
  eventLabelEl.textContent = eventType === 'ding' ? '🔔 DOORBELL PRESSED' : '🏃 MOTION DETECTED'
  shouldRecord = record || false
  if (cameraId) {
    activeCameraId = cameraId
    reconnectCount = 0
    stopPc()                                      // cleanly end old session first
    setTimeout(() => startWebRTC(cameraId), 500)  // wait before starting new one
  }
})

async function startWebRTC(cameraId) {
  stopPc()
  loadingState.classList.remove('hidden')
  errorState.classList.remove('visible')
  video.srcObject = null

  try {
    pc = new RTCPeerConnection({
      iceServers: [
        { urls: 'stun:stun.l.google.com:19302' },
        { urls: 'stun:stun1.l.google.com:19302' },
        { urls: 'stun:stun.kinesisvideo.us-east-1.amazonaws.com:443' },
        { urls: 'stun:stun.kinesisvideo.us-west-2.amazonaws.com:443' },
      ],
      iceTransportPolicy: 'all',
    })

    pc.ontrack = (event) => {
      if (event.track.kind === 'video') {
        video.srcObject = event.streams[0]
        loadingState.classList.add('hidden')
        video.play().catch(() => {})
        if (shouldRecord && event.streams[0]) {
          try { startRecording(event.streams[0].clone()) } catch(e) { console.error('[recorder]', e) }
        }
      }
    }

    pc.onconnectionstatechange = () => {
      if (pc && (pc.connectionState === 'failed' || pc.connectionState === 'disconnected')) {
        stopPc()
        if (activeCameraId && reconnectCount < 5) {
          reconnectCount++
          loadingState.classList.remove('hidden')
          errorState.classList.remove('visible')
          loadingCamEl.textContent = `Reconnecting (${reconnectCount}/5)…`
          reconnectTimer = setTimeout(() => startWebRTC(activeCameraId), 3000)
        } else {
          loadingState.classList.add('hidden')
          errorState.classList.add('visible')
          errorMsg.textContent = 'STREAM LOST'
        }
      }
    }

    pc.addTransceiver('video', { direction: 'recvonly' })
    pc.addTransceiver('audio', { direction: 'recvonly' })

    const offer = await pc.createOffer()
    await pc.setLocalDescription(offer)

    // Wait for ICE gathering (max 6 seconds)
    await new Promise(resolve => {
      if (pc.iceGatheringState === 'complete') { resolve(); return }
      const t = setTimeout(resolve, 6000)
      pc.onicegatheringstatechange = () => {
        if (pc.iceGatheringState === 'complete') { clearTimeout(t); resolve() }
      }
    })

    const sdpOffer = pc.localDescription.sdp
    const result = await ipcRenderer.invoke('start-webrtc-session', { cameraId, sdpOffer })

    if (result.error) throw new Error(result.error)

    // Ring answers with a=sendrecv (bidirectional) but RFC 3264 requires
    // the answer to a recvonly offer to be sendonly or inactive.
    // Replace sendrecv→sendonly so Chromium accepts the answer.
    const fixedSdp = result.sdpAnswer.replace(/a=sendrecv/g, 'a=sendonly')
    await pc.setRemoteDescription({ type: 'answer', sdp: fixedSdp })

  } catch(e) {
    loadingState.classList.add('hidden')
    errorState.classList.add('visible')
    errorMsg.textContent = 'STREAM ERROR: ' + (e.message || 'unknown')
  }
}
</script>
</body>
</html>
